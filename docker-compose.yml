services:
  engine:
    build: ./engine
    environment:
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY is required}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.minimax.io/v1}
      - LLM_MODEL=${LLM_MODEL:-MiniMax-M3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-200000}
      - LLM_API_PROTOCOL=${LLM_API_PROTOCOL:-openai}
    volumes:
      - ./src:/opt/aimd/src:ro
      - ./dist:/opt/aimd/dist
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/opt/aimd/dist:ro
      - ./public:/opt/aimd/public:ro
    depends_on:
      - engine
    restart: unless-stopped

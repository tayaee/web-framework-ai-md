name: ai-md-${LLM_NAME:-default}

services:
  engine:
    build: ./engine
    container_name: ai_md_engine_${LLM_NAME:-default}
    environment:
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY is required}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.minimax.io/v1}
      - LLM_MODEL=${LLM_MODEL:-MiniMax-M3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-100000}
      - LLM_API_PROTOCOL=${LLM_API_PROTOCOL:-openai}
    volumes:
      - ./src:/opt/aimd/src:ro
      - ./dist:/opt/aimd/dist
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: ai_md_nginx_${LLM_NAME:-default}
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./dist:/opt/aimd/dist:ro
      - ./public:/opt/aimd/public:ro
    depends_on:
      - engine
    restart: unless-stopped

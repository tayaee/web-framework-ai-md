<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AIMD</title>
    <style>
        :root {
            --bg: #fff;
            --bg-secondary: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent: #0071e3;
            --card-bg: #fff;
            --card-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000;
                --bg-secondary: #1d1d1f;
                --text: #f5f5f7;
                --text-secondary: #a1a1a6;
                --accent: #2997ff;
                --card-bg: #1d1d1f;
                --card-shadow: 0 2px 24px rgba(0, 0, 0, 0.4);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 96px 24px;
        }

        main {
            width: 100%;
            max-width: 720px;
            text-align: center;
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 12px;
            opacity: 0;
            transform: translateY(8px);
            animation: fade-up 0.6s ease-out forwards;
        }

        p.tagline {
            font-size: 21px;
            color: var(--text-secondary);
            margin: 0 0 56px;
            opacity: 0;
            transform: translateY(8px);
            animation: fade-up 0.6s ease-out 0.1s forwards;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            opacity: 0;
            transform: translateY(8px);
            animation: fade-up 0.6s ease-out 0.2s forwards;
        }

        @media (max-width: 560px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }

        a.card {
            display: block;
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: var(--card-shadow);
            padding: 36px 28px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        a.card:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.1);
        }

        a.card .icon {
            font-size: 36px;
            margin-bottom: 16px;
        }

        a.card h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px;
        }

        a.card p {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 0 0 16px;
        }

        a.card .cta {
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
        }

        @keyframes fade-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>AI.MD</h1>
        <p class="tagline">AI-powered Markdown Engine — natural language files, compiled into apps.</p>

        <div class="cards">
            <a class="card" href="/tetris.ai.md">
                <div class="icon">🎮</div>
                <h2>Tetris</h2>
                <p>Terminal-themed Tetris SPA compiled from a single markdown spec.</p>
                <div class="cta">Play now →</div>
            </a>

            <a class="card" href="/convert.ai.md/docs">
                <div class="icon">🌡️</div>
                <h2>Convert API</h2>
                <p>Temperature conversion REST API, with interactive docs.</p>
                <div class="cta">Try the API →</div>
            </a>
        </div>
    </main>
</body>
</html>
